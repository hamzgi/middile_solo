<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Dark Mode Toggle (Checkbox Hack) -->
  <input type="checkbox" id="darkModeToggle">

  <!-- Floating Mode Toggle Button -->
  <label for="darkModeToggle" class="floating-toggle"></label>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">MyPortfolio</a>
      <ul class="navbar-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="project.html">Project</a></li>
        <li><a href="team.html">Team</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <!-- Hero Card -->
    <div class="card hero-card">
      <div class="hero-content">
        <h1>제 포트폴리오를 소개합니다.</h1>
        <p>제 프로젝트와 팀, 블로그 등을 소개하기 위한 포트폴리오 페이지 입니다.</p>
        <div class="hero-buttons">
          <a href="about.html" class="btn btn-primary">본인 소개</a>
          <a href="project.html" class="btn btn-secondary">프로젝트</a>
        </div>
      </div>
      <div class="hero-avatar">👤</div>
    </div>

    <!-- Statistics Section -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number">3</div>
        <div class="stat-label">개인 프로젝트</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">2</div>
        <div class="stat-label">팀 프로젝트</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">2</div>
        <div class="stat-label">자격증</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">멋사</div>
        <div class="stat-label">동아리 활동</div>
      </div>
    </div>

    <!-- Quick Links Section -->
    <h2 class="section-title">빠른 링크</h2>
    <div class="quick-links">
      <a href="mailto:your-email@example.com" class="quick-link-card">
        <div class="quick-link-icon">✉️</div>
        <div class="quick-link-label">이메일</div>
      </a>
      <a href="https://github.com" target="_blank" class="quick-link-card">
        <div class="quick-link-icon">🐙</div>
        <div class="quick-link-label">GitHub</div>
      </a>
      <a href="https://tistory.com" target="_blank" class="quick-link-card">
        <div class="quick-link-icon">📝</div>
        <div class="quick-link-label">Tistory</div>
      </a>
      <a href="tel:+82123456789" class="quick-link-card">
        <div class="quick-link-icon">📞</div>
        <div class="quick-link-label">전화번호</div>
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-container">
      <div class="footer-left">© 2026 MyPortfolio</div>
      <div class="footer-right">
        <a href="https://github.com" target="_blank" class="icon-button">🐙</a>
        <a href="https://linkedin.com" target="_blank" class="icon-button">🔗</a>
      </div>
    </div>
  </footer>

  <!-- Dark Mode Persistence Script -->
  <script src="script.js"></script>
</body>
</html>
